spring.application.name=smart-public-infra
server.port=5000

# H2 file database replaces SQLite for the Spring Boot version.
spring.datasource.url=jdbc:h2:file:./data/civicwatchdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let JPA create/update the complaint table automatically.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional H2 browser console for local development.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart upload settings.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session cookie settings similar to Flask session behavior.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# External folders reused from the existing project structure.
app.upload-dir=../static/uploads
app.frontend-dir=../static/frontend
spring.application.name=smart-public-infra
